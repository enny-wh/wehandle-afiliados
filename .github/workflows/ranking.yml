name: Atualizar ranking de afiliados

on:
  schedule:
    - cron: "0 12 * * *"   # Todo dia às 09h (horário de Brasília = UTC-3)
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  update-ranking:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar ranking da Sympla
        env:
          SYMPLA_TOKEN: ${{ secrets.91d4b59b2fbea74686fdd2944cddb3f4a4379682ead338ed45a32f5637a9eeaf }}
          SYMPLA_EVENT_ID: ${{ secrets.3449146 }}
        run: python fetch_ranking.py

      - name: Commit e push do ranking atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranking.json
          git diff --staged --quiet || git commit -m "chore: atualiza ranking de afiliados $(date +'%Y-%m-%d')"
          git push
